<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>centralize items with flexbox</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(0, 0, 30);
            font-family: monospace;
        }
        main{
            height: 100vh;
            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
            align-items: center;
        }
        section{
            background-color: rgb(255, 123, 0);
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 5px 5px 0px rgb(0, 0, 0);
        }
    </style>
</head>
<body>
    <main>
        <section>
          
            <h1>Centralize Items With Flexbox</h1>
          
        </section>
    </main>
</body>
</html>
